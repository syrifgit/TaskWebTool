<html>
  <head>
	<meta content="text/html;charset=utf-8" http-equiv="Content-Type">
	<meta content="utf-8" http-equiv="encoding">
    <title>Oldschool Runescape Map</title>
	<link rel="icon" 
      type="image/png" 
      href="images/favicon_world_osrs.png"/>
	  
	<link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/leaflet.css"/>
    <link rel="stylesheet" href="css/plugins/leaflet.fullscreen.css"/>
	<link rel="stylesheet" href="css/plugins/leaflet.MousePosition.css"/>
	<link rel="stylesheet" href="css/plugins/leaflet.icons.css"/>
	<link rel="stylesheet" href="css/plugins/leaflet.mapTemplate.css"/>
	<link rel="stylesheet" href="css/plugins/leaflet.customZoom.css"/>
	<link rel="stylesheet" href="css/plugins/leaflet.displays.css"/>

	<script type="module" src="js/main/main_osrs.js"></script>
	<script type="module" src="js/plugins/leaflet.tasks.js"></script>
	<script type="module" src="js/plugins/leaflet.planner.js"></script>
	
	</head>
  <body>
    <div id="app-wrapper">
      <a id="bug-report-btn" href="https://discord.com/channels/636001942279159830/1481097091110404250" target="_blank" rel="noopener" title="Report a bug on Discord">🐛 Report Bug · @i_have_groot</a>
      <div id="map"></div>
      <div id="task-panel-resizer" title="Drag to resize task panel" aria-hidden="true"></div>
      <div id="task-panel">
        <div id="task-panel-header">
          <span id="task-panel-title">League Tasks</span>
          <button id="task-search-open-btn" class="task-search-open-btn" title="Search and browse league tasks">🔍 Task Search</button>
        </div>
        <!-- Task search overlay (shown when Task Search button is clicked) -->
        <div id="task-search-overlay" style="display:none;">
          <div id="task-search-overlay-header">
            <span class="task-search-overlay-title">Task Search</span>
            <button id="task-search-close-btn" class="task-search-close-btn" title="Close">✕ Close</button>
          </div>
          <div id="task-search-overlay-controls">
            <input id="task-search-input" type="text" placeholder="Search tasks..." autocomplete="off" />
            <label id="task-general-toggle">
              <input type="checkbox" id="task-show-general" />
              Show general tasks
            </label>
          </div>
          <div id="task-search-results"></div>
        </div>
        <!-- Completion stats (visible when planner shown) -->
        <div id="task-panel-stats"></div>
        <!-- Planner (always visible unless search overlay is open) -->
        <div id="planner-container">
          <div id="planner-status" class="planner-status-banner" style="display:none;"></div>
          <div id="planner-list"></div>
        </div>
      </div>
    </div>
  </body>
</html>
